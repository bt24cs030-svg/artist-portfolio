<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | ArtHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .reset-container {
            background: white;
            max-width: 450px;
            width: 90%;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            animation: slideInUp 0.6s ease;
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            color: #2c3e50;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .back-home:hover {
            background: white;
            transform: translateY(-2px);
        }
        h1 { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 2rem;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 5px 15px rgba(255,107,107,0.1);
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,107,107,0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #27ae60; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .info { background: #d1ecf1; color: #0c5460; border-left: 4px solid #17a2b8; }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .token-info {
            background: #f8f9fa;
            padding: 0.8rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
        .strength-meter {
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .strength-weak { background: #dc3545; width: 33%; }
        .strength-medium { background: #ffc107; width: 66%; }
        .strength-strong { background: #27ae60; width: 100%; }
    </style>
</head>
<body>
    <a href="login.html" class="back-home">← Back to Login</a>
    <div class="reset-container">
        <h1>🔑 Reset Password</h1>
        <p class="subtitle">Create a new password for your account</p>
        
        <div id="message" class="message"></div>
        <div id="tokenInfo" class="token-info">Validating reset link...</div>
        
        <form id="resetForm">
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="New Password" required>
                <div class="strength-meter">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>
            <button type="submit" id="resetBtn" class="btn">Reset Password</button>
        </form>
        
        <p style="text-align:center; margin-top:1.5rem;">
            <a href="login.html" style="color:#ff6b6b;">Back to Login</a>
        </p>
    </div>

    <script type="module">
        import { getAllArtists } from './api.js';
        
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        let resetData = null;
        let isValidToken = false;
        
        // Password strength checker
        const newPassword = document.getElementById('newPassword');
        const strengthBar = document.getElementById('strengthBar');
        
        function checkPasswordStrength(password) {
            let strength = 0;
            if (password.length >= 4) strength++;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;
            
            strengthBar.className = 'strength-bar';
            if (strength <= 2) {
                strengthBar.classList.add('strength-weak');
                return 'Weak';
            } else if (strength <= 4) {
                strengthBar.classList.add('strength-medium');
                return 'Medium';
            } else {
                strengthBar.classList.add('strength-strong');
                return 'Strong';
            }
        }
        
        newPassword.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
        });
        
        // Validate token
        async function validateToken() {
            const tokenInfo = document.getElementById('tokenInfo');
            const messageDiv = document.getElementById('message');
            
            if (!token) {
                tokenInfo.innerHTML = '❌ Invalid or missing reset token.';
                tokenInfo.style.background = '#f8d7da';
                tokenInfo.style.color = '#721c24';
                document.getElementById('resetBtn').disabled = true;
                return false;
            }
            
            // Get reset data from localStorage
            const storedReset = JSON.parse(localStorage.getItem('passwordReset') || 'null');
            
            if (!storedReset || storedReset.token !== token) {
                tokenInfo.innerHTML = '❌ Invalid reset token. Please request a new password reset.';
                tokenInfo.style.background = '#f8d7da';
                tokenInfo.style.color = '#721c24';
                document.getElementById('resetBtn').disabled = true;
                return false;
            }
            
            if (storedReset.expiry < Date.now()) {
                tokenInfo.innerHTML = '⏰ This reset link has expired. Please request a new one.';
                tokenInfo.style.background = '#f8d7da';
                tokenInfo.style.color = '#721c24';
                document.getElementById('resetBtn').disabled = true;
                return false;
            }
            
            // Verify email exists in database
            try {
                const artists = await getAllArtists();
                const artist = artists.find(a => a.email === storedReset.email);
                
                if (!artist) {
                    tokenInfo.innerHTML = '❌ Account not found. Please register first.';
                    tokenInfo.style.background = '#f8d7da';
                    tokenInfo.style.color = '#721c24';
                    document.getElementById('resetBtn').disabled = true;
                    return false;
                }
                
                tokenInfo.innerHTML = `✅ Valid reset link for <strong>${storedReset.email}</strong><br>You can now set a new password.`;
                tokenInfo.style.background = '#d4edda';
                tokenInfo.style.color = '#155724';
                resetData = storedReset;
                return true;
                
            } catch (error) {
                tokenInfo.innerHTML = '❌ Error validating account. Please try again.';
                tokenInfo.style.background = '#f8d7da';
                tokenInfo.style.color = '#721c24';
                return false;
            }
        }
        
        // Reset password function
        async function resetPassword(newPassword) {
            // Get all artists
            const artists = await getAllArtists();
            const artistIndex = artists.findIndex(a => a.email === resetData.email);
            
            if (artistIndex === -1) {
                throw new Error('Account not found');
            }
            
            // In a real application, you would call an API to update the password
            // For demo, we'll update localStorage
            const storedArtists = JSON.parse(localStorage.getItem('artists') || '[]');
            const localArtistIndex = storedArtists.findIndex(a => a.email === resetData.email);
            
            if (localArtistIndex !== -1) {
                storedArtists[localArtistIndex].password = newPassword;
                localStorage.setItem('artists', JSON.stringify(storedArtists));
            }
            
            // Remove reset token
            localStorage.removeItem('passwordReset');
            
            return true;
        }
        
        // Handle form submission
        const form = document.getElementById('resetForm');
        const resetBtn = document.getElementById('resetBtn');
        const messageDiv = document.getElementById('message');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            // Validate token first
            if (!isValidToken && !(await validateToken())) {
                return;
            }
            
            // Validate passwords
            if (newPass !== confirmPass) {
                messageDiv.innerHTML = '❌ Passwords do not match!';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            if (newPass.length < 4) {
                messageDiv.innerHTML = '❌ Password must be at least 4 characters long.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                return;
            }
            
            // Disable button
            resetBtn.disabled = true;
            resetBtn.innerHTML = '<span class="loading"></span> Resetting...';
            
            try {
                await resetPassword(newPass);
                
                messageDiv.innerHTML = '✅ Password reset successful! You can now login with your new password.';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                
                // Clear form
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                // Redirect after 3 seconds
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
                
            } catch (error) {
                messageDiv.innerHTML = `❌ Failed to reset password: ${error.message}`;
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                resetBtn.disabled = false;
                resetBtn.innerHTML = 'Reset Password';
            }
        });
        
        // Initialize
        validateToken().then(valid => {
            isValidToken = valid;
            if (!valid) {
                resetBtn.disabled = true;
            }
        });
    </script>
</body>
</html>
