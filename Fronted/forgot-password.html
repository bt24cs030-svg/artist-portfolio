<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | ArtHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .forgot-container {
            background: white;
            max-width: 450px;
            width: 90%;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            animation: slideInUp 0.6s ease;
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            color: #2c3e50;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s;
        }
        .back-home:hover {
            background: white;
            transform: translateY(-2px);
        }
        h1 { 
            text-align: center; 
            color: #2c3e50; 
            margin-bottom: 1rem;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 2rem;
            color: #7f8c8d;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 5px 15px rgba(255,107,107,0.1);
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
            color: white;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255,107,107,0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .message {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        .success { background: #d4edda; color: #155724; border-left: 4px solid #27ae60; }
        .error { background: #f8d7da; color: #721c24; border-left: 4px solid #dc3545; }
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .reset-info {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <a href="login.html" class="back-home">← Back to Login</a>
    <div class="forgot-container">
        <h1>🔐 Forgot Password?</h1>
        <p class="subtitle">Enter your email to reset password</p>
        
        <div id="message" class="message"></div>
        
        <form id="forgotForm">
            <div class="form-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            <button type="submit" id="submitBtn" class="btn">Send Reset Link</button>
        </form>
        
        <div class="reset-info">
            <p>📧 A password reset link will be sent to your email.</p>
            <p style="font-size: 0.7rem; margin-top: 0.5rem;">🎓 Demo Mode • No actual email will be sent</p>
        </div>
        
        <p style="text-align:center; margin-top:1.5rem;">
            <a href="login.html" style="color:#ff6b6b;">Remember password? Login</a>
        </p>
    </div>

    <script type="module">
        import { getAllArtists } from './api.js';
        
        const form = document.getElementById('forgotForm');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');
        const emailInput = document.getElementById('email');
        
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            
            if (!email) {
                showMessage('Please enter your email address.', 'error');
                return;
            }
            
            // Disable button and show loading
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> Sending...';
            
            try {
                // Get all artists from API
                const artists = await getAllArtists();
                const artist = artists.find(a => a.email === email);
                
                if (artist) {
                    // Generate reset token
                    const resetToken = Math.random().toString(36).substr(2, 8).toUpperCase();
                    const resetData = {
                        email: email,
                        token: resetToken,
                        expiry: Date.now() + 3600000, // 1 hour
                        artistId: artist.artist_id,
                        artistName: artist.name
                    };
                    
                    // Save reset request to localStorage (simulated)
                    localStorage.setItem('passwordReset', JSON.stringify(resetData));
                    
                    // Also save to database via API (would need backend endpoint)
                    // For demo, we'll use localStorage
                    
                    showMessage(`
                        ✅ Password reset link sent to <strong>${email}</strong><br><br>
                        <strong>Demo Reset Token:</strong> ${resetToken}<br><br>
                        <a href="reset-password.html?token=${resetToken}" style="color:#155724; text-decoration:underline;">Click here to reset your password</a>
                    `, 'success');
                    
                    emailInput.value = '';
                } else {
                    showMessage('❌ No account found with this email address.', 'error');
                }
                
            } catch (error) {
                console.error('Error:', error);
                showMessage('❌ Unable to process request. Please try again later.', 'error');
            } finally {
                // Reset button
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Send Reset Link';
            }
        });
        
        function showMessage(msg, type) {
            messageDiv.innerHTML = msg;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
            
            // Auto hide after 10 seconds
            setTimeout(() => {
                if (messageDiv.style.display === 'block') {
                    messageDiv.style.display = 'none';
                }
            }, 10000);
        }
        
        // Clear message when typing
        emailInput.addEventListener('input', () => {
            if (messageDiv.style.display === 'block') {
                messageDiv.style.display = 'none';
            }
        });
    </script>
</body>
</html>
