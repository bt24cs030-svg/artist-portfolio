<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ArtHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .admin-login-container {
            background: white;
            max-width: 450px;
            width: 90%;
            padding: 3rem;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: slideInUp 0.6s ease;
        }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            color: #2c3e50;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
        }
        h1 { text-align: center; margin-bottom: 0.5rem; }
        .admin-badge {
            background: #ff6b6b;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e9ecef;
            border-radius: 15px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff6b6b;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        .links {
            text-align: center;
            margin-top: 1.5rem;
        }
        .links a {
            color: #ff6b6b;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">🏠 Back to Home</a>

    <div class="admin-login-container">
        <div style="text-align: center;">
            <span class="admin-badge">🛡️ Admin Access</span>
            <h1>Admin Login</h1>
            <p style="color: #7f8c8d; margin-bottom: 2rem;">Enter admin credentials</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <input type="text" id="adminUsername" placeholder="Username" required>
            </div>
            <div class="form-group">
                <input type="password" id="adminPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="btn">🔐 Admin Login</button>
        </form>

        <div class="links">
            <a href="login.html">← Artist Login</a>
        </div>
    </div>

    <script>
        // Admin credentials (in production, store securely in database)
        const ADMIN_CREDENTIALS = {
            username: 'admin',
            password: 'admin123'
        };

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                // Set admin session
                sessionStorage.setItem('isAdmin', 'true');
                sessionStorage.setItem('adminLoggedIn', 'true');
                
                // Redirect to admin panel
                window.location.href = 'admin.html';
            } else {
                const errorMsg = document.getElementById('errorMsg');
                errorMsg.textContent = '❌ Invalid admin credentials!';
                errorMsg.style.display = 'block';
                
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
